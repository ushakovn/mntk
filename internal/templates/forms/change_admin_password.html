<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <link rel="icon" href="assets/favicon.svg"/>
    <title>Смена пароля администратора</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('/assets/background.svg');
            background-size: cover;
            background-repeat: no-repeat;
            /*display: flex;*/
            justify-content: center;
            align-items: center;
            background-color: #bfcfde;
            /* Центрирование */
            margin: 0;
            height: 100vh;
            display: grid;
            place-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            /* Без центрирования */
            /*margin: 30px;*/
            padding: 20px;
            background-color: rgba(255, 255, 255, 1);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        input[type="password"], input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .error-message {
            color: #607288;
            font-size: 14px;
            display: none;
            margin-bottom: 20px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background-color: #95abc3;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
        }

        button:hover {
            background-color: #7d9bb7;
        }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <button type="button" id="backBtn">
        Вернуться назад
    </button>
    <hr>

    <h5>Смена пароля администратора 🔐</h5>
    <hr>

    <form id="passwordChangeForm">
        <label for="currentPassword">Текущий пароль</label>
        <input type="password" id="currentPassword" name="currentPassword" required>

        <label for="newPassword">Новый пароль</label>
        <input type="password" id="newPassword" name="newPassword" required>

        <label for="confirmPassword">Подтвердите новый пароль</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required>

        <div class="error-message" id="error-message"></div>

        <input type="submit" value="Сменить пароль">
    </form>
</div>

<script>
    document.getElementById('backBtn').addEventListener('click', function () {
        window.location.href = '/admin'
    })

    document.getElementById('passwordChangeForm').addEventListener('submit', function (event) {
        event.preventDefault()

        const currPass = document.getElementById('currentPassword').value
        const newPass = document.getElementById('newPassword').value

        const confirmPass = document.getElementById('confirmPassword').value
        const err = document.getElementById('error-message')

        err.style.display = 'none'

        if (newPass.length < 8) {
            err.textContent = 'Новый пароль должен содержать минимум 8 символов 🚨︎'
            err.style.display = 'block'
            return
        }

        if (newPass !== confirmPass) {
            err.textContent = 'Новый пароль и подтверждение пароля не совпадают 🚨'
            err.style.display = 'block'
            return
        }

        changePassword(err, currPass, newPass)
    })

    async function changePassword(err, currPass, newPass) {
        try {
            let resp = await fetch("/admin/password/change", {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(
                    {
                        "current": `${currPass}`,
                        "new": `${newPass}`
                    })
            })

            if (!resp.ok) {
                console.error(`/admin/password/change: response status: ${resp.status}`)

                let text = await resp.text()

                err.textContent = text + ' 🚨';
                err.style.display = 'block'

                return
            }

        } catch (error) {
            console.error(error.message);
        }

        err.textContent = 'Пароль успешно изменен!';
        err.style.display = 'block';

        await fetch("/admin/logout", {
            method: 'POST',
        })
    }

</script>

</body>
</html>
