<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плавающая кнопка</title>
    <style>
        /* Основные стили для кнопки */
        .floating-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            z-index: 1000;
        }

        .floating-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<!-- Плавающая кнопка -->
<button class="floating-button" onclick="handleClick()">+</button>

<script>
    function handleClick() {
        alert("Плавающая кнопка нажата!");
    }
</script>
</body>
</html>
